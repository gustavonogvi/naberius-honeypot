<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honeypot</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080808;
      color: #ececec;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid #1a1a1a;
      padding: 28px 48px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      width: 32px;
      height: 32px;
    }

    .logo-arc {
      fill: none;
      stroke: #ffffff;
      stroke-width: 1.5;
    }

    .logo-dot {
      fill: #ffffff;
    }

    header h1 {
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #ffffff;
    }

    header span {
      font-size: 12px;
      color: #888;
      margin-left: auto;
      letter-spacing: 0.05em;
    }

    .stats {
      display: flex;
      border-bottom: 1px solid #1a1a1a;
    }

    .stat {
      flex: 1;
      padding: 32px 48px;
      border-right: 1px solid #1a1a1a;
    }

    .stat:last-child { border-right: none; }

    .stat .label {
      font-size: 11px;
      color: #888;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .stat .value {
      font-size: 36px;
      font-weight: 300;
      color: #ffffff;
      letter-spacing: -0.02em;
    }

    .table-wrap {
      padding: 0 48px 48px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 32px;
    }

    thead tr {
      border-bottom: 1px solid #1a1a1a;
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 400;
      color: #888;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid #111;
      color: #bbb;
      font-weight: 300;
    }

    tbody tr:hover td {
      color: #ececec;
      background: #0e0e0e;
    }

    .ip {
      color: #ffffff;
      font-weight: 400;
    }

    .payload {
      color: #777;
      font-family: monospace;
      font-size: 12px;
    }

    .location {
      color: #888;
    }

    .empty {
      text-align: center;
      padding: 64px;
      color: #333;
      font-size: 13px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <header>
    <svg class="logo" viewBox="0 0 32 32">
      <path class="logo-arc" d="M 16 28 A 14 14 0 0 1 2 16 A 14 14 0 0 1 16 2"/>
      <circle class="logo-dot" cx="16" cy="2" r="1.5"/>
      <circle class="logo-dot" cx="2" cy="16" r="1.5"/>
      <circle class="logo-dot" cx="16" cy="28" r="1.5"/>
    </svg>
    <h1>HONEYPOT</h1>
    <span id="last-update">—</span>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="label">Total Events</div>
      <div class="value" id="total">—</div>
    </div>
    <div class="stat">
      <div class="label">Unique IPs</div>
      <div class="value" id="unique-ips">—</div>
    </div>
    <div class="stat">
      <div class="label">Countries</div>
      <div class="value" id="countries">—</div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>IP</th>
          <th>Location</th>
          <th>ASN</th>
          <th>Payload</th>
        </tr>
      </thead>
      <tbody id="events-body">
        <tr><td colspan="5" class="empty">waiting for events</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    async function loadEvents() {
      const res = await fetch("http://localhost:5000/events");
      const events = await res.json();

      document.getElementById("total").textContent = events.length;
      document.getElementById("unique-ips").textContent = new Set(events.map(e => e.ip)).size;
      document.getElementById("countries").textContent = new Set(events.map(e => e.country).filter(Boolean)).size;
      document.getElementById("last-update").textContent = new Date().toLocaleTimeString();

      const tbody = document.getElementById("events-body");

      if (events.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="empty">waiting for events</td></tr>`;
        return;
      }

      tbody.innerHTML = events.map(e => {
        const location = [e.city, e.country].filter(Boolean).join(", ") || "—";
        const ts = e.timestamp.replace("T", " ").slice(0, 19);
        return `
          <tr>
            <td>${ts}</td>
            <td class="ip">${e.ip}</td>
            <td class="location">${location}</td>
            <td class="location">${e.asn || "—"}</td>
            <td class="payload">${JSON.stringify(e.payload)}</td>
          </tr>`;
      }).join("");
    }

    loadEvents();
    setInterval(loadEvents, 10000);
  </script>

</body>
</html>
